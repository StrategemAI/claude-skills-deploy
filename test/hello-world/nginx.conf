server {
    listen 3000;
    server_name _;

    # Health check endpoint — polled by Coolify after every deploy
    location /api/health {
        default_type text/plain;
        return 200 'ok\n';
    }

    # Smoke-test content — checked by e2e.sh to confirm the right image is running
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
